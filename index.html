<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michelle Mazo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <!-- NAV -->
    <nav>
      <a href="#" class="nav-logo">
        <div class="logo-mark">MM</div>
        <span class="logo-name">Michelle Mazo</span>
      </a>
      <ul class="nav-links">
        <li><a href="#about">About Me</a></li>
        <li><a href="#resume">Resume</a></li>
        <li><a href="#gallery">Photo Gallery</a></li>
      </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">

      <!-- LEFT: text -->
      <div class="hero-text">
        <p class="hero-eyebrow">Portfolio</p>

        <h1 class="hero-name">
          <span class="line"><span>Michelle</span></span>
          <span class="line"><span>Mazo</span></span>
        </h1>

        <div class="hero-divider"></div>

        <p class="hero-desc">
          Designer, creator, and visual storyteller.<br />
          Crafting experiences that are bold,<br />
          intentional, and always human-centered.
        </p>

        <div class="hero-cta">
          <a href="#about"><span>View My Work</span></a>
        </div>
      </div>

      <!-- RIGHT: image placeholder -->
      <div class="hero-image">
        <div class="image-frame">
          <div class="placeholder-img">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#081F5C" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p>Your photo here</p>
          </div>
        </div>
      </div>

    </section>

    <!-- COMING SOON -->
    <footer class="coming-soon">
      <div class="cs-line"></div>
      <div class="cs-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="cs-text">More coming soon</span>
      <div class="cs-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="cs-line"></div>
    </footer>

  </div>
</body>
</html>
