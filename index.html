<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michelle Mazo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <!-- NAV -->
    <nav>
      <a href="#" class="nav-logo">
        <img src="assets/logo.png" alt="Michelle Mazo" class="logo-img" />
        <span class="logo-name">Michelle Mazo</span>
      </a>
      <ul class="nav-links">
        <li><a href="#about">About Me</a></li>
        <li><a href="#resume">Resume</a></li>
        <li><a href="#gallery">Photo Gallery</a></li>
      </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">

      <!-- LEFT: text -->
      <div class="hero-text">

        <h1 class="hero-name">
          <span class="line"><span>Hi! I'm Michelle. A Product Designer.</span></span>
        </h1>

        <div class="hero-divider"></div>

        <p class="hero-desc">
          a pug and coffee lover that also loves creating digital experiences that simplify, uplift, and nurture human connection.
        </p>

      </div>

      <!-- RIGHT: image placeholder -->
      <div class="hero-image">
        <img src="assets/hero.png" alt="Michelle Mazo" class="hero-photo" />
      </div>

    </section>

    <!-- COMING SOON -->
    <footer class="coming-soon">
      <div class="cs-line"></div>
      <div class="cs-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="cs-text">More coming soon</span>
      <div class="cs-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="cs-line"></div>
